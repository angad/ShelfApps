name: ParkCams
options:
  bundleIdPrefix: com.angad
  deploymentTarget:
    iOS: "12.0"
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "12.0"
    ENABLE_BITCODE: "NO"
    ENABLE_DEBUG_DYLIB: "NO"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: "NO"
targets:
  ParkCams:
    type: application
    platform: iOS
    sources:
      - ParkCams
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: AVKit.framework
      - sdk: ImageIO.framework
      - sdk: QuartzCore.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.angad.parkcams
        PRODUCT_NAME: ParkCams
        INFOPLIST_FILE: ParkCams/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
