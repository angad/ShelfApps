name: DriveDash
options:
  bundleIdPrefix: com.angad
  deploymentTarget:
    iOS: "12.0"
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "12.0"
    ENABLE_BITCODE: "NO"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: "NO"
targets:
  DriveDash:
    type: application
    platform: iOS
    sources:
      - DriveDash
    dependencies:
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.angad.drivedash
        PRODUCT_NAME: DriveDash
        INFOPLIST_FILE: DriveDash/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
