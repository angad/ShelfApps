name: OverheadFlight
options:
  bundleIdPrefix: com.angad
  deploymentTarget:
    iOS: "12.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "12.0"
    ENABLE_BITCODE: "NO"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: "NO"
targets:
  OverheadFlight:
    type: application
    platform: iOS
    sources:
      - OverheadFlight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.angad.overheadflight
        PRODUCT_NAME: OverheadFlight
        INFOPLIST_FILE: OverheadFlight/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
